[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = "dist"

[dev]
  framework = "vite"
  command = "npm run dev"
  targetPort = 5173

[functions]
  "*" = { node_bundler = "esbuild" }
  "search" = { timeout = 26 }
  "create-slides" = { timeout = 30 }

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: data: https://accounts.google.com https://*.gstatic.com https://apis.google.com; frame-src 'self' https://accounts.google.com; connect-src 'self' https://accounts.google.com https://*.gstatic.com https://oauth2.googleapis.com https://slides.googleapis.com https://www.gstatic.com; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://accounts.google.com https://*.gstatic.com https://www.gstatic.com"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
