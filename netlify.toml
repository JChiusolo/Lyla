[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = "dist"

[dev]
  framework = "vite"
  command = "npm run dev"
  targetPort = 5173

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production]
  command = "npm run build"
  publish = "dist"

[context.deploy-preview]
  command = "npm run build"
  publish = "dist"

[context.branch-deploy]
  command = "npm run build"
  publish = "dist"

[env.production]
  VITE_API_URL = "https://lyla-demo.netlify.app"
  VITE_PUBMED_API_KEY = ""
  VITE_SCIENTIFIC_RESEARCH_LOOKUP_API_KEY = ""
  VITE_SCHOLAR_GATEWAY_API_KEY = ""

[env.development]
  VITE_API_URL = "http://localhost:8888"
  VITE_PUBMED_API_KEY = ""
  VITE_SCIENTIFIC_RESEARCH_LOOKUP_API_KEY = ""
  VITE_SCHOLAR_GATEWAY_API_KEY = ""
